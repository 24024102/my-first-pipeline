version: '3.8'
services:
  nginx: 
    image: nginx:alpine
    ports:
     - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - web
  web:
    image: 24024102/my-first-pipeline:latest
    expose:
      - "80"
    restart: always
    depends_on:
      - db
    environment:
      - DB_HOST=db
      - DB_NAME=mydatabase
      - DB_USER=admin
      - DB_PASSWORD=root
    deploy:
       replicas: 3
       resources:
         limits: 
          cpus: "0.5"
          memory: 128M


  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: root
      POSTGRES_DB: mydatabase
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d mydatabase"]
      interval: 5s
      timeout: 5s
      retries: 5
  loctus:
     image: locustio/locust
     ports:
      - "8089:8089"
     volumes:
      - ./locustfile.py:/mnt/locust/locustfile.py:ro
     command: -f /mnt/locust/locustfile.py
  
  
  prometheus:
    image: prom/prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.47.0
    ports:
      - "8080:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    
  grafana:
    image: grafana/grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    
  

volumes:
  pgdata:
   