name: Build and Push Docker Image 

on:
  push:
    branches:
      - feature/cicd

jobs:
  build:
    runs-on: ubuntu-latest 

    steps: 
      - name: Check out the repo
        uses: actions/checkout@v4 

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: '24024102'
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true 
          tags: 24024102/my-first-pipeline:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to AWS
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.AWS_HOST  }}
          username: ${{secrets.AWS_USERNAME }}
          key: ${{ secrets.AWS_SSH_KEY}}
          script: |
            git clone https://github.com/24024102/my-first-pipeline.git my-project || true
            cd my-project
            git fectch origin 
            git checkout feature/cicd
            git pull origin feature/cicd
            docker pull 24024102/my-first-pipeline:latest
            docker-compose down 
            docker-compose up -d

